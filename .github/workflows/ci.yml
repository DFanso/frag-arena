name: CI

# Typecheck + test gate (issue #14). Runs on every PR and push to master, and the Docker image
# workflow (docker-image.yml) builds/pushes only after this passes on master.
on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Generate the gitignored worker-configuration.d.ts the worker typecheck + tests need.
      - run: npm run cf-typegen

      - name: Typecheck (worker + node targets)
        run: npm run typecheck

      - name: Test (vitest, incl. Durable Object suite under workerd)
        run: npm test
